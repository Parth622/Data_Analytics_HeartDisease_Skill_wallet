<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Heart Disease Analytics Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/dashboard.css') }}" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
</head>
<body>
    <header class="app-header">
        <h1>Heart Disease Analytics Dashboard</h1>
        <p>Interactive Data Visualization Platform</p>
    </header>

    <nav class="nav nav-pills page-nav px-3 pb-3">
        <a class="nav-link {% if request.endpoint in ['dashboard'] %}active{% endif %}" href="{{ url_for('dashboard') }}">Dashboard</a>
        <a class="nav-link {% if request.endpoint == 'story' %}active{% endif %}" href="{{ url_for('story') }}">Data Story</a>
        <a class="nav-link {% if request.endpoint == 'performance' %}active{% endif %}" href="{{ url_for('performance') }}">Performance</a>
        <a class="nav-link {% if request.endpoint == 'documentation' %}active{% endif %}" href="{{ url_for('documentation') }}">Documentation</a>
    </nav>

    <main class="container-fluid pb-4">
        {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='js/charts.js') }}"></script>
</body>
</html>
